name: Release Go CLI

on:
  workflow_call:
    inputs:
      version:
        description: SemVer release version, with or without a leading v
        required: true
        type: string
      repository-type:
        description: Signing identity and stable identifier policy
        required: true
        type: string
      homebrew-tap:
        description: Homebrew tap owner/repo; empty defaults by repository-type
        required: false
        default: ''
        type: string
      homebrew-formula:
        description: Formula name to hand to the configured tap; empty disables handoff
        required: false
        default: ''
        type: string
      extra-packages:
        description: JSON array of additional repo-relative files or directories to package
        required: false
        default: '[]'
        type: string
      nfpm:
        description: 'nFPM package mode: auto, enabled, or disabled'
        required: false
        default: auto
        type: string
      build-runner:
        description: 'GoReleaser build host: ubuntu or macos'
        required: false
        default: ubuntu
        type: string
      strict-checks:
        description: Require every independent check green instead of only branch-required contexts
        required: false
        default: false
        type: boolean
    secrets:
      MACOS_SIGNING_P12:
        description: Base64-encoded Developer ID Application certificate and private key
        required: true
      MACOS_SIGNING_P12_PASSWORD:
        description: Password for MACOS_SIGNING_P12
        required: true
      ASC_KEY_ID:
        description: App Store Connect API key ID
        required: true
      ASC_ISSUER_ID:
        description: App Store Connect issuer ID
        required: true
      ASC_PRIVATE_KEY_P8:
        description: App Store Connect API private key contents
        required: true
      TAP_TOKEN:
        description: Token with Actions access to the matching Homebrew tap
        required: false
    outputs:
      release-id:
        description: Numeric GitHub release ID
        value: ${{ jobs.draft.outputs.release-id }}
      release-url:
        description: Published GitHub release URL
        value: ${{ jobs.publish.outputs.release-url }}

concurrency:
  group: release-go-cli-${{ github.repository }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: 1 · Validate frozen source
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: read
      statuses: read
    outputs:
      default-branch: ${{ steps.repository.outputs.default-branch }}
      homebrew-tap: ${{ steps.inputs.outputs.homebrew-tap }}
      release-notes-artifact-name: ${{ steps.metadata.outputs.release-notes-artifact-name }}
      release-version: ${{ steps.inputs.outputs.release-version }}
      tag: ${{ steps.inputs.outputs.tag }}
      target-sha: ${{ steps.repository.outputs.target-sha }}
    steps:
      - name: Validate inputs
        id: inputs
        env:
          BUILD_RUNNER: ${{ inputs.build-runner }}
          EXTRA_PACKAGES: ${{ inputs.extra-packages }}
          HOMEBREW_FORMULA: ${{ inputs.homebrew-formula }}
          HOMEBREW_TAP: ${{ inputs.homebrew-tap }}
          NFPM_MODE: ${{ inputs.nfpm }}
          REPOSITORY_TYPE: ${{ inputs.repository-type }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          release_version=${VERSION#v}
          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "version must be SemVer, with optional leading v" >&2
            exit 1
          fi
          if [[ "$REPOSITORY_TYPE" != openclaw && "$REPOSITORY_TYPE" != personal ]]; then
            echo "repository-type must be openclaw or personal" >&2
            exit 1
          fi
          if [[ "$BUILD_RUNNER" != ubuntu && "$BUILD_RUNNER" != macos ]]; then
            echo "build-runner must be ubuntu or macos" >&2
            exit 1
          fi
          if [[ "$NFPM_MODE" != auto && "$NFPM_MODE" != enabled && "$NFPM_MODE" != disabled ]]; then
            echo "nfpm must be auto, enabled, or disabled" >&2
            exit 1
          fi
          homebrew_tap=$HOMEBREW_TAP
          if [[ -z "$homebrew_tap" ]]; then
            if [[ "$REPOSITORY_TYPE" == openclaw ]]; then
              homebrew_tap=openclaw/homebrew-tap
            else
              homebrew_tap=steipete/homebrew-tap
            fi
          fi
          if [[ ! "$homebrew_tap" =~ ^[A-Za-z0-9][A-Za-z0-9-]{0,38}/[A-Za-z0-9._-]+$ ]] ||
             [[ "$homebrew_tap" == */. || "$homebrew_tap" == */.. ]]; then
            echo "homebrew-tap must be an owner/repo name" >&2
            exit 1
          fi
          if [[ -n "$HOMEBREW_FORMULA" && ! "$HOMEBREW_FORMULA" =~ ^[A-Za-z0-9][A-Za-z0-9+_.@-]*$ ]]; then
            echo "homebrew-formula must be a formula filename stem" >&2
            exit 1
          fi
          jq -e '
            type == "array" and
            all(.[];
              type == "string" and length > 0 and
              (startswith("/") | not) and
              (split("/") | all(. != ".."))
            ) and
            ([.[] | split("/")[-1]] | length == (unique | length))
          ' <<<"$EXTRA_PACKAGES" >/dev/null
          {
            echo "release-version=$release_version"
            echo "tag=v$release_version"
            echo "homebrew-tap=$homebrew_tap"
          } >>"$GITHUB_OUTPUT"

      - name: Resolve protected release target
        id: repository
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TAG: ${{ steps.inputs.outputs.tag }}
        with:
          script: |
            const repo = await github.rest.repos.get(context.repo);
            const branchName = repo.data.default_branch;
            const branch = await github.rest.repos.getBranch({
              ...context.repo,
              branch: branchName,
            });
            if (!branch.data.protected) {
              core.setFailed(`default branch ${branchName} is not protected`);
              return;
            }
            const branchHead = branch.data.commit.sha;
            if (context.ref !== `refs/heads/${branchName}` || context.sha !== branchHead) {
              core.setFailed(`caller must run at protected ${branchName} head ${branchHead}; got ${context.ref}@${context.sha}`);
              return;
            }

            let targetSha = branchHead;
            let targetSource = 'protected-head';
            let existingTag = null;
            try {
              existingTag = await github.rest.git.getRef({
                ...context.repo,
                ref: `tags/${process.env.TAG}`,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existingTag !== null) {
              if (existingTag.data.object.type !== 'tag') {
                core.setFailed(`existing tag is lightweight, not annotated: ${process.env.TAG}`);
                return;
              }
              const tagObject = await github.rest.git.getTag({
                ...context.repo,
                tag_sha: existingTag.data.object.sha,
              });
              if (tagObject.data.object.type !== 'commit') {
                core.setFailed(`annotated tag does not peel directly to a commit: ${process.env.TAG}`);
                return;
              }
              targetSha = tagObject.data.object.sha;
              targetSource = 'annotated-tag';

              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                ...context.repo,
                basehead: `${targetSha}...${branchHead}`,
                per_page: 1,
              });
              if (!['ahead', 'identical'].includes(comparison.data.status)) {
                core.setFailed(`tag commit ${targetSha} is not reachable from protected ${branchName} head ${branchHead}`);
                return;
              }
              core.info(`retry target frozen by annotated tag ${process.env.TAG} at ${targetSha}`);
            } else {
              core.info(`first-attempt target is protected ${branchName} head ${branchHead}`);
            }
            core.setOutput('default-branch', branchName);
            core.setOutput('target-sha', targetSha);
            core.setOutput('target-source', targetSource);

      - name: Check out exact release target
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ steps.repository.outputs.target-sha }}

      - name: Validate release metadata
        id: metadata
        env:
          EXTRA_PACKAGES: ${{ inputs.extra-packages }}
          RELEASE_VERSION: ${{ steps.inputs.outputs.release-version }}
        run: |
          set -euo pipefail
          [[ -f CHANGELOG.md ]] || { echo "CHANGELOG.md is required" >&2; exit 1; }
          [[ -f go.mod ]] || { echo "go.mod is required" >&2; exit 1; }
          goreleaser_config=
          for candidate in \
            .config/goreleaser.yml .config/goreleaser.yaml \
            .goreleaser.yml .goreleaser.yaml \
            goreleaser.yml goreleaser.yaml; do
            if [[ -f "$candidate" ]]; then
              goreleaser_config=$candidate
              break
            fi
          done
          [[ -n "$goreleaser_config" ]] || {
            echo "a GoReleaser config is required" >&2
            exit 1
          }

          python3 - "$RELEASE_VERSION" "$RUNNER_TEMP/RELEASE-NOTES.md" <<'PY'
          from pathlib import Path
          import re
          import sys

          version, output = sys.argv[1:]
          raw = Path("CHANGELOG.md").read_bytes()
          text = raw.decode("utf-8")
          version_pattern = re.compile(rf"(?<![0-9A-Za-z.])v?{re.escape(version)}(?![0-9A-Za-z.+-])")
          date_pattern = re.compile(r"[0-9]{4}-[0-9]{2}-[0-9]{2}")
          heading_pattern = re.compile(r"^##[ \t]+")
          fence_pattern = re.compile(r"^[ ]{0,3}(`{3,}|~{3,})")
          headings = []
          offset = 0
          fence = None
          in_comment = False
          for line in text.splitlines(keepends=True):
              content = line.rstrip("\r\n")
              if fence is not None:
                  closing = re.match(rf"^[ ]{{0,3}}{re.escape(fence[0])}{{{fence[1]},}}[ \t]*$", content)
                  if closing:
                      fence = None
                  offset += len(line)
                  continue

              if not in_comment:
                  opening = fence_pattern.match(content)
                  if opening:
                      marker = opening.group(1)
                      fence = (marker[0], len(marker))
                      offset += len(line)
                      continue
                  if heading_pattern.match(content):
                      headings.append((offset, offset + len(line), content))

              cursor = 0
              while cursor < len(content):
                  marker = "-->" if in_comment else "<!--"
                  marker_at = content.find(marker, cursor)
                  if marker_at < 0:
                      break
                  in_comment = not in_comment
                  cursor = marker_at + len(marker)
              offset += len(line)

          matches = [
              candidate
              for candidate in headings
              if version_pattern.search(candidate[2]) and date_pattern.search(candidate[2])
          ]
          if len(matches) != 1:
              raise SystemExit(
                  f"CHANGELOG.md needs exactly one dated level-two section for {version}; found {len(matches)}"
              )
          match = matches[0]
          end = next((candidate[0] for candidate in headings if candidate[0] > match[0]), len(text))
          section = text[match[0]:end]
          if not section.strip():
              raise SystemExit("release notes section is empty")
          Path(output).write_bytes(section.encode("utf-8"))
          PY

          version_files=(.release-version VERSION version.txt)
          for version_file in "${version_files[@]}"; do
            [[ -f "$version_file" ]] || continue
            actual=$(tr -d '[:space:]' <"$version_file")
            actual=${actual#v}
            [[ "$actual" == "$RELEASE_VERSION" ]] || {
              echo "$version_file contains $actual, expected $RELEASE_VERSION" >&2
              exit 1
            }
          done

          package_files=()
          [[ -f package.json ]] && package_files+=(package.json)
          while IFS= read -r path; do
            [[ -d "$path" && -f "$path/package.json" ]] && package_files+=("$path/package.json")
          done < <(jq -r '.[]' <<<"$EXTRA_PACKAGES")
          for package_file in "${package_files[@]}"; do
            actual=$(jq -er '.version' "$package_file")
            actual=${actual#v}
            [[ "$actual" == "$RELEASE_VERSION" ]] || {
              echo "$package_file version $actual does not match $RELEASE_VERSION" >&2
              exit 1
            }
          done

          while IFS= read -r path; do
            [[ -e "$path" ]] || { echo "extra package path does not exist: $path" >&2; exit 1; }
            [[ ! -L "$path" ]] || { echo "extra package path cannot be a symlink: $path" >&2; exit 1; }
            [[ -z "$(find "$path" -type l -print -quit)" ]] || {
              echo "extra package trees cannot contain symlinks: $path" >&2
              exit 1
            }
          done < <(jq -r '.[]' <<<"$EXTRA_PACKAGES")

          echo "release-notes-artifact-name=release-notes-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >>"$GITHUB_OUTPUT"

      - name: Upload frozen release notes
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.metadata.outputs.release-notes-artifact-name }}
          path: ${{ runner.temp }}/RELEASE-NOTES.md
          if-no-files-found: error
          retention-days: 30

      - name: Require independent CI green on frozen target
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          DEFAULT_BRANCH: ${{ steps.repository.outputs.default-branch }}
          STRICT_CHECKS: ${{ inputs.strict-checks }}
          TARGET_SHA: ${{ steps.repository.outputs.target-sha }}
        with:
          script: |
            const acceptableConclusions = new Set(['success', 'neutral', 'skipped']);
            const currentRunMarker = `/actions/runs/${context.runId}`;
            const allCheckRuns = await github.paginate(github.rest.checks.listForRef, {
              ...context.repo,
              ref: process.env.TARGET_SHA,
              per_page: 100,
              filter: 'latest',
            });
            const checkRuns = allCheckRuns.filter((check) => !check.details_url?.includes(currentRunMarker));
            const allStatuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
              ...context.repo,
              ref: process.env.TARGET_SHA,
              per_page: 100,
            });
            const latestStatuses = new Map();
            for (const status of allStatuses) {
              const normalizedContext = status.context.toLowerCase();
              if (!latestStatuses.has(normalizedContext)) latestStatuses.set(normalizedContext, status);
            }

            const required = new Map();
            const normalizeContext = (name) => name.toLowerCase();
            const addRequired = (name, appId = null) => {
              if (!name) return;
              const normalizedName = normalizeContext(name);
              const normalizedAppId = Number.isInteger(appId) && appId >= 0 ? appId : null;
              if (normalizedAppId !== null) {
                required.delete(`${normalizedName}\u0000*`);
              } else if ([...required.values()].some((entry) =>
                entry.normalizedName === normalizedName && entry.appId !== null)) {
                return;
              }
              required.set(`${normalizedName}\u0000${normalizedAppId ?? '*'}`, {
                name,
                normalizedName,
                appId: normalizedAppId,
              });
            };
            const addRequiredStatusChecks = (policy) => {
              if (!policy) return;
              const checks = policy.checks ?? [];
              for (const check of checks) addRequired(check.context, check.app_id);
              for (const name of policy.contexts ?? []) {
                if (![...required.values()].some((entry) =>
                  entry.normalizedName === normalizeContext(name))) addRequired(name);
              }
            };

            const branch = await github.rest.repos.getBranch({
              ...context.repo,
              branch: process.env.DEFAULT_BRANCH,
            });
            const projectedPolicy = branch.data.protection?.required_status_checks;
            addRequiredStatusChecks(projectedPolicy);

            const effectiveRules = await github.paginate('GET /repos/{owner}/{repo}/rules/branches/{branch}', {
              ...context.repo,
              branch: process.env.DEFAULT_BRANCH,
              per_page: 100,
            });
            for (const rule of effectiveRules) {
              if (rule.type !== 'required_status_checks') continue;
              for (const check of rule.parameters?.required_status_checks ?? []) {
                addRequired(check.context, check.integration_id);
              }
            }

            const strictChecks = process.env.STRICT_CHECKS === 'true';
            if (required.size > 0) {
              const appIdsByBotLogin = new Map();
              const statusAppId = async (status) => {
                const login = status.creator?.login;
                if (status.creator?.type !== 'Bot' || !login?.endsWith('[bot]')) return null;
                if (!appIdsByBotLogin.has(login)) {
                  const slug = login.slice(0, -'[bot]'.length);
                  appIdsByBotLogin.set(login, github.rest.apps.getBySlug({ app_slug: slug })
                    .then((response) => response.data.id)
                    .catch((error) => {
                      if (error.status === 404) return null;
                      throw error;
                    }));
                }
                return appIdsByBotLogin.get(login);
              };
              const failures = [];
              for (const requirement of required.values()) {
                const matchingRuns = checkRuns.filter((check) =>
                  normalizeContext(check.name) === requirement.normalizedName &&
                  (requirement.appId === null || check.app?.id === requirement.appId)
                );
                let matchingStatus = latestStatuses.get(requirement.normalizedName);
                if (matchingStatus && requirement.appId !== null &&
                    await statusAppId(matchingStatus) !== requirement.appId) {
                  matchingStatus = undefined;
                  for (const status of allStatuses) {
                    if (normalizeContext(status.context) === requirement.normalizedName &&
                        await statusAppId(status) === requirement.appId) {
                      matchingStatus = status;
                      break;
                    }
                  }
                }
                const greenRuns = matchingRuns.every((check) =>
                  check.status === 'completed' && acceptableConclusions.has(check.conclusion)
                );
                const hasSignal = matchingRuns.length > 0 || matchingStatus !== undefined;
                const greenStatus = matchingStatus === undefined || matchingStatus.state === 'success';
                if (!hasSignal || !greenRuns || !greenStatus) {
                  const observed = [
                    ...matchingRuns.map((check) => `${check.status}/${check.conclusion}`),
                    ...(matchingStatus ? [`status/${matchingStatus.state}`] : []),
                  ];
                  failures.push(`${requirement.name}${requirement.appId === null ? '' : `@app:${requirement.appId}`}=${observed.join('|') || 'missing'}`);
                }
              }
              core.info(`Required CI contexts: ${[...required.values()].map((entry) => entry.name).join(', ')}`);
              if (failures.length > 0) core.setFailed(`required checks not green: ${failures.join(', ')}`);
              if (!strictChecks) return;
            }

            core.info(`CI gate mode: ${strictChecks ? 'strict all-checks' : 'all-check fallback (no required contexts)'}`);
            if (checkRuns.length === 0 && latestStatuses.size === 0) {
              core.setFailed('frozen target has no independent CI check or commit status');
              return;
            }
            const badChecks = checkRuns.filter((check) =>
              check.status !== 'completed' || !acceptableConclusions.has(check.conclusion)
            );
            const badStatuses = [...latestStatuses.values()].filter((status) => status.state !== 'success');
            if (badChecks.length > 0 || badStatuses.length > 0) {
              const failures = [
                ...badChecks.map((check) => `${check.name}=${check.status}/${check.conclusion}`),
                ...badStatuses.map((status) => `${status.context}=status/${status.state}`),
              ];
              core.setFailed(`non-green checks: ${failures.join(', ')}`);
            }

  tag:
    name: 2 · Freeze annotated tag
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create immutable annotated tag
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          REPOSITORY_TYPE: ${{ inputs.repository-type }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
        with:
          script: |
            try {
              const existing = await github.rest.git.getRef({ ...context.repo, ref: `tags/${process.env.TAG}` });
              if (existing.data.object.type !== 'tag') {
                core.setFailed(`existing tag is lightweight, not signed or annotated: ${process.env.TAG}`);
                return;
              }
              const tagObject = await github.rest.git.getTag({ ...context.repo, tag_sha: existing.data.object.sha });
              if (tagObject.data.object.type !== 'commit' || tagObject.data.object.sha !== process.env.TARGET_SHA) {
                core.setFailed(`existing tag does not freeze ${process.env.TARGET_SHA}`);
                return;
              }
              core.info(`reusing exact signed or annotated tag ${process.env.TAG}`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const tagObject = await github.rest.git.createTag({
              ...context.repo,
              tag: process.env.TAG,
              message: `Release ${process.env.TAG}\n\nFleet policy: ${process.env.REPOSITORY_TYPE}; annotated by openclaw/release-workflows.`,
              object: process.env.TARGET_SHA,
              type: 'commit',
              tagger: {
                name: 'github-actions[bot]',
                email: '41898282+github-actions[bot]@users.noreply.github.com',
                date: new Date().toISOString(),
              },
            });
            await github.rest.git.createRef({
              ...context.repo,
              ref: `refs/tags/${process.env.TAG}`,
              sha: tagObject.data.sha,
            });

  build:
    name: 3a · GoReleaser build matrix
    needs: [validate, tag]
    runs-on: ${{ inputs.build-runner == 'macos' && 'macos-15' || 'ubuntu-latest' }}
    permissions:
      contents: read
    outputs:
      nfpm-enabled: ${{ steps.build-mode.outputs.nfpm-enabled }}
    steps:
      - name: Check out frozen tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0
      - name: Verify tag target
        env:
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$TARGET_SHA" ]]
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve GoReleaser package mode
        id: build-mode
        env:
          NFPM_MODE: ${{ inputs.nfpm }}
        run: |
          set -euo pipefail
          config=
          for candidate in \
            .config/goreleaser.yml .config/goreleaser.yaml \
            .goreleaser.yml .goreleaser.yaml \
            goreleaser.yml goreleaser.yaml; do
            if [[ -f "$candidate" ]]; then
              config=$candidate
              break
            fi
          done
          [[ -n "$config" ]] || { echo "a GoReleaser config is required" >&2; exit 1; }
          has_nfpms=$(ruby -rpsych -e '
            config = Psych.safe_load(
              File.read(ARGV.fetch(0)),
              permitted_classes: [],
              permitted_symbols: [],
              aliases: true
            ) || {}
            nfpms = config["nfpms"]
            abort "nfpms must be an array when present" unless nfpms.nil? || nfpms.is_a?(Array)
            print(!nfpms.nil? && !nfpms.empty? ? "true" : "false")
          ' "$config")
          case "$NFPM_MODE" in
            auto) nfpm_enabled=$has_nfpms ;;
            enabled)
              [[ "$has_nfpms" == true ]] || {
                echo "nfpm=enabled requires a nonempty nfpms list in $config" >&2
                exit 1
              }
              nfpm_enabled=true
              ;;
            disabled) nfpm_enabled=false ;;
          esac
          if [[ "$nfpm_enabled" == true ]]; then
            args="release --config=$config --clean --timeout 60m --release-notes=/dev/null --skip=announce,archive,aur,aur-source,chocolatey,docker,flatpak,homebrew,ko,makeself,mcp,nix,notarize,publish,sbom,scoop,sign,snapcraft,srpm,validate,winget"
          else
            args="build --config=$config --clean --timeout 60m"
          fi
          {
            echo "nfpm-enabled=$nfpm_enabled"
            echo "args=$args"
          } >>"$GITHUB_OUTPUT"
      - name: Build configured GoReleaser matrix
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        env:
          GORELEASER_CURRENT_TAG: ${{ needs.validate.outputs.tag }}
        with:
          distribution: goreleaser
          version: '~> v2'
          args: ${{ steps.build-mode.outputs.args }}
      - name: Add extra package payloads
        env:
          EXTRA_PACKAGES: ${{ inputs.extra-packages }}
        run: |
          set -euo pipefail
          mkdir -p dist/extra-package-payload
          while IFS= read -r path; do
            [[ -n "$path" ]] || continue
            cp -R "$path" dist/extra-package-payload/
          done < <(jq -r '.[]' <<<"$EXTRA_PACKAGES")
          if [[ -z "$(find dist/extra-package-payload -mindepth 1 -print -quit)" ]]; then
            rmdir dist/extra-package-payload
          fi
          tar -czf raw-goreleaser-dist.tar.gz dist
      - name: Upload raw matrix
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: raw-goreleaser-dist-${{ github.run_id }}
          path: raw-goreleaser-dist.tar.gz
          if-no-files-found: error
          retention-days: 1

  sign:
    name: 3b · Sign, notarize, and package macOS
    needs: [validate, build]
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Download raw matrix
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: raw-goreleaser-dist-${{ github.run_id }}
      - name: Restore raw matrix
        run: tar -xzf raw-goreleaser-dist.tar.gz
      - name: Import policy signer into ephemeral keychain
        id: signer
        env:
          P12_BASE64: ${{ secrets.MACOS_SIGNING_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_SIGNING_P12_PASSWORD }}
          REPOSITORY_TYPE: ${{ inputs.repository-type }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/release-signing.keychain-db"
          keychain_password=$(openssl rand -hex 32)
          p12="$RUNNER_TEMP/release-signing.p12"
          printf '%s' "$P12_BASE64" | base64 --decode >"$p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"

          if [[ "$REPOSITORY_TYPE" == openclaw ]]; then
            team_id=FWJYW4S8P8
            authority="Developer ID Application: OpenClaw Foundation ($team_id)"
            identifier_prefix=org.openclaw
          else
            team_id=Y5PE65HELJ
            authority="Developer ID Application: Peter Steinberger ($team_id)"
            identifier_prefix=com.steipete
          fi
          {
            echo "authority=$authority"
            echo "identifier-prefix=$identifier_prefix"
            echo "keychain=$keychain"
            echo "team-id=$team_id"
          } >>"$GITHUB_OUTPUT"
          rm -f "$p12"

      - name: Scope keychain and validate signing identity
        id: signing_identity
        env:
          AUTHORITY: ${{ steps.signer.outputs.authority }}
          KEYCHAIN: ${{ steps.signer.outputs.keychain }}
        run: |
          set -euo pipefail
          search_list_file="$RUNNER_TEMP/release-original-user-keychains.txt"
          security list-keychains -d user \
            | sed -E 's/^[[:space:]]*"//; s/"[[:space:]]*$//' \
            >"$search_list_file"

          signing_search=("$KEYCHAIN")
          while IFS= read -r existing_keychain; do
            [[ -n "$existing_keychain" && "$existing_keychain" != "$KEYCHAIN" ]] \
              && signing_search+=("$existing_keychain")
          done <"$search_list_file"
          security list-keychains -d user -s "${signing_search[@]}"

          identities=$(security find-identity -v -p codesigning "$KEYCHAIN")
          identity_hash=$(awk -v authority="$AUTHORITY" '
            index($0, "\"" authority "\"") && $2 ~ /^[0-9A-Fa-f]{40}$/ {
              print toupper($2)
              exit
            }
          ' <<<"$identities")
          [[ "$identity_hash" =~ ^[0-9A-F]{40}$ ]] || {
            echo "required signing identity not present: $AUTHORITY" >&2
            exit 1
          }
          echo "identity-hash=$identity_hash" >>"$GITHUB_OUTPUT"

      - name: Build universal binaries, sign, and notarize every macOS binary
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_P8: ${{ secrets.ASC_PRIVATE_KEY_P8 }}
          AUTHORITY: ${{ steps.signer.outputs.authority }}
          IDENTIFIER_PREFIX: ${{ steps.signer.outputs.identifier-prefix }}
          KEYCHAIN: ${{ steps.signer.outputs.keychain }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          SIGNING_IDENTITY_HASH: ${{ steps.signing_identity.outputs.identity-hash }}
          TEAM_ID: ${{ steps.signer.outputs.team-id }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          work="$RUNNER_TEMP/macos-release"
          mkdir -p "$work/submissions" dist/universal_darwin_all
          p8="$work/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_PRIVATE_KEY_P8" >"$p8"
          chmod 600 "$p8"
          trap 'rm -rf "$work"' EXIT

          : >"$work/macho.tsv"
          while IFS= read -r -d '' candidate; do
            if file "$candidate" | grep -q 'Mach-O'; then
              archs=$(lipo -archs "$candidate")
              printf '%s\t%s\t%s\n' "$archs" "$candidate" "$(basename "$candidate")" >>"$work/macho.tsv"
            fi
          done < <(find dist -type f -perm -111 -print0)
          [[ -s "$work/macho.tsv" ]] || { echo "GoReleaser produced no macOS executable" >&2; exit 1; }

          # signature-assertion-helpers-begin
          signature_diagnostic_value() {
            local value=$1
            value=$(printf '%s' "$value" | tr '\r\n\t' '   ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')
            [[ -n "$value" ]] || value='<missing>'
            printf '%s' "$value"
          }

          fail_signature_assertion() {
            local label=$1
            local expected=$2
            local observed=$3
            local subject=$4
            expected=$(signature_diagnostic_value "$expected")
            observed=$(signature_diagnostic_value "$observed")
            printf 'signature assertion failed [%s] for %s\n' "$label" "$subject" >&2
            printf '  expected (public metadata): %s\n' "$expected" >&2
            printf '  observed (public metadata): %s\n' "$observed" >&2
            return 1
          }

          codesign_display_value() {
            local key=$1
            local display=$2
            awk -v key="$key" '
              index($0, key "=") == 1 {
                print substr($0, length(key) + 2)
                exit
              }
            ' <<<"$display"
          }

          codesign_display_values() {
            local key=$1
            local display=$2
            awk -v key="$key" '
              index($0, key "=") == 1 {
                print substr($0, length(key) + 2)
              }
            ' <<<"$display"
          }

          normalize_designated_requirement() {
            local value=$1
            printf '%s\n' "$value" \
              | sed -E '/^[[:space:]]*Executable=/d' \
              | tr '\r\n\t' '   ' \
              | sed -E 's|/\* exists \*/|exists|g; s/[[:space:]]+/ /g; s/"([A-Za-z0-9.]+)"/\1/g; s/ Executable=.*$//; s/^ //; s/ $//'
          }

          assert_signature_equal() {
            local label=$1
            local expected=$2
            local observed=$3
            local subject=$4
            [[ "$observed" == "$expected" ]] \
              || fail_signature_assertion "$label" "$expected" "$observed" "$subject"
          }

          assert_signature_line_present() {
            local label=$1
            local expected=$2
            local observed=$3
            local subject=$4
            awk -v expected="$expected" '$0 == expected { found = 1 } END { exit(found ? 0 : 1) }' <<<"$observed" \
              || fail_signature_assertion "$label" "$expected" "$observed" "$subject"
          }

          assert_signature_runtime() {
            local label=$1
            local observed=$2
            local subject=$3
            [[ "$observed" == *flags=* && "$observed" == *'(runtime)'* ]] \
              || fail_signature_assertion "$label" 'CodeDirectory flags containing (runtime)' "$observed" "$subject"
          }

          assert_signature_timestamp() {
            local label=$1
            local observed=$2
            local subject=$3
            [[ -n "$observed" && "$observed" != none ]] \
              || fail_signature_assertion "$label" 'nonempty trusted timestamp' "$observed" "$subject"
          }
          # signature-assertion-helpers-end

          pair_count=0
          while IFS= read -r binary_name; do
            [[ -n "$binary_name" ]] || continue
            intel_paths=()
            while IFS= read -r path; do
              [[ -n "$path" ]] && intel_paths+=("$path")
            done < <(awk -F '\t' -v name="$binary_name" '$1 == "x86_64" && $3 == name { print $2 }' "$work/macho.tsv")
            arm_paths=()
            while IFS= read -r path; do
              [[ -n "$path" ]] && arm_paths+=("$path")
            done < <(awk -F '\t' -v name="$binary_name" '$1 == "arm64" && $3 == name { print $2 }' "$work/macho.tsv")
            if (( ${#intel_paths[@]} == 1 && ${#arm_paths[@]} == 1 )); then
              lipo -create "${intel_paths[0]}" "${arm_paths[0]}" -output "dist/universal_darwin_all/$binary_name"
              chmod +x "dist/universal_darwin_all/$binary_name"
              pair_count=$((pair_count + 1))
            elif (( ${#intel_paths[@]} > 0 || ${#arm_paths[@]} > 0 )); then
              echo "cannot form one stable universal pair for $binary_name" >&2
              exit 1
            fi
          done < <(awk -F '\t' '{ print $3 }' "$work/macho.tsv" | LC_ALL=C sort -u)
          (( pair_count > 0 )) || { echo "at least one x86_64 + arm64 pair is required" >&2; exit 1; }

          : >"$work/signing-manifest.jsonl"
          while IFS= read -r -d '' candidate; do
            file "$candidate" | grep -q 'Mach-O' || continue
            binary_slug=$(basename "$candidate" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g; s/^-+|-+$//g')
            repo_slug=$(printf '%s' "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g; s/^-+|-+$//g')
            identifier="$IDENTIFIER_PREFIX.$repo_slug.$binary_slug"
            requirement="identifier \"$identifier\" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] exists and certificate leaf[field.1.2.840.113635.100.6.1.13] exists and certificate leaf[subject.OU] = \"$TEAM_ID\""
            codesign --force --options runtime --timestamp --identifier "$identifier" \
              --requirements "=designated => $requirement" --keychain "$KEYCHAIN" \
              --sign "$SIGNING_IDENTITY_HASH" "$candidate"
            codesign --verify --strict -R="$requirement" --verbose=2 "$candidate"
            signature=$(codesign -dvvv "$candidate" 2>&1)
            observed_identifier=$(codesign_display_value Identifier "$signature")
            observed_authorities=$(codesign_display_values Authority "$signature")
            observed_team_id=$(codesign_display_value TeamIdentifier "$signature")
            observed_code_directory=$(awk '/^CodeDirectory / { print; exit }' <<<"$signature")
            observed_timestamp=$(codesign_display_value Timestamp "$signature")
            assert_signature_equal "identifier" "$identifier" "$observed_identifier" "$candidate"
            assert_signature_line_present "authority-name" "$AUTHORITY" "$observed_authorities" "$candidate"
            assert_signature_equal "team-id" "$TEAM_ID" "$observed_team_id" "$candidate"
            assert_signature_runtime "hardened-runtime" "$observed_code_directory" "$candidate"
            assert_signature_timestamp "trusted-timestamp" "$observed_timestamp" "$candidate"
            embedded=$(codesign -d -r- "$candidate" 2>&1)
            expected_requirement=$(normalize_designated_requirement "designated => $requirement")
            observed_requirement=$(normalize_designated_requirement "$embedded")
            assert_signature_equal "designated-requirement" "$expected_requirement" "$observed_requirement" "$candidate"

            submission="$work/submissions/$(printf '%s' "$identifier" | tr '.' '-')-$(shasum -a 256 <<<"$candidate" | cut -c1-10).zip"
            ditto -c -k --keepParent "$candidate" "$submission"
            xcrun notarytool submit "$submission" --key "$p8" --key-id "$ASC_KEY_ID" \
              --issuer "$ASC_ISSUER_ID" --no-s3-acceleration --wait --output-format json >"$submission.json"
            [[ "$(jq -r '.status' "$submission.json")" == Accepted ]]
            ready=0
            delay=5
            deadline=$(( SECONDS + 900 ))
            while (( SECONDS < deadline )); do
              if codesign --verify --strict --check-notarization -R=notarized --verbose=2 "$candidate"; then
                ready=1
                break
              fi
              echo "notarization ticket not yet propagated for $candidate; retrying in ${delay}s"
              sleep "$delay"
              (( delay < 60 )) && delay=$(( delay * 2 ))
            done
            (( ready == 1 )) || { echo "notarization ticket unavailable for $candidate after 15m" >&2; exit 1; }
            jq -n --arg path "${candidate#dist/}" --arg identifier "$identifier" \
              --arg architecture "$(lipo -archs "$candidate")" --arg authority "$AUTHORITY" \
              --arg teamId "$TEAM_ID" --arg requirement "$requirement" \
              '{path:$path,identifier:$identifier,architecture:$architecture,authority:$authority,teamId:$teamId,designatedRequirement:$requirement,hardenedRuntime:true,notarized:true}' \
              >>"$work/signing-manifest.jsonl"
          done < <(find dist -type f -perm -111 -print0)

          mkdir -p release-assets
          jq -s --arg repository "$GITHUB_REPOSITORY" '{schemaVersion:1,repository:$repository,binaries:.}' \
            "$work/signing-manifest.jsonl" >release-assets/SIGNING-MANIFEST.json

      - name: Assemble signed archives and nFPM packages
        env:
          NFPM_ENABLED: ${{ needs.build.outputs.nfpm-enabled }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release-version }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          node <<'NODE'
          // artifact-assembler-begin
          const fs = require('fs');
          const path = require('path');
          const { execFileSync } = require('child_process');

          const distDirectory = path.resolve('dist');
          const releaseDirectory = path.resolve('release-assets');
          const repositoryName = process.env.REPOSITORY_NAME;
          const releaseVersion = process.env.RELEASE_VERSION;
          const nfpmEnabled = process.env.NFPM_ENABLED === 'true';
          const artifactsPath = path.join(distDirectory, 'artifacts.json');
          if (!fs.existsSync(artifactsPath)) throw new Error('GoReleaser artifacts.json is missing');
          const artifacts = JSON.parse(fs.readFileSync(artifactsPath, 'utf8'));
          if (!Array.isArray(artifacts)) throw new Error('GoReleaser artifacts.json must be an array');
          if (!/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(repositoryName ?? '')) {
            throw new Error('repository name cannot form a safe release asset name');
          }
          if (!/^[0-9A-Za-z][0-9A-Za-z.+-]*$/.test(releaseVersion ?? '')) {
            throw new Error('release version cannot form a safe release asset name');
          }
          fs.mkdirSync(releaseDirectory, { recursive: true });

          const canonicalTargets = new Map([
            ['darwin/amd64', 'darwin_amd64'],
            ['darwin/arm64', 'darwin_arm64'],
            ['linux/amd64', 'linux_amd64'],
            ['linux/arm64', 'linux_arm64'],
            ['windows/amd64', 'windows_amd64'],
            ['windows/arm64', 'windows_arm64'],
          ]);
          const targetRows = [];
          const archiveNames = new Set();
          const directories = fs.readdirSync(distDirectory, { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .sort((left, right) => left.name.localeCompare(right.name));
          for (const entry of directories) {
            const directory = path.join(distDirectory, entry.name);
            const targetSlug = entry.name.replace(/[^A-Za-z0-9._-]+/g, '-');
            const archiveName = `${repositoryName}_${releaseVersion}_${targetSlug}.tar.gz`;
            if (!/^[A-Za-z0-9][A-Za-z0-9+@._-]*\.tar\.gz$/.test(archiveName)) {
              throw new Error(`unsafe release archive name: ${archiveName}`);
            }
            if (archiveNames.has(archiveName) || fs.existsSync(path.join(releaseDirectory, archiveName))) {
              throw new Error(`duplicate release archive name: ${archiveName}`);
            }
            archiveNames.add(archiveName);
            execFileSync('tar', ['-czf', path.join(releaseDirectory, archiveName), '-C', directory, '.'], {
              stdio: 'inherit',
            });

            let canonicalTarget = '';
            if (entry.name === 'universal_darwin_all') {
              canonicalTarget = 'darwin_universal';
            } else {
              const prefix = `dist/${entry.name}/`;
              const platforms = new Set(artifacts
                .filter((artifact) => artifact.type === 'Binary' &&
                  typeof artifact.path === 'string' && artifact.path.startsWith(prefix))
                .map((artifact) => `${artifact.goos}/${artifact.goarch}`));
              if (platforms.size > 1) {
                throw new Error(`release archive mixes GoReleaser platforms: dist/${entry.name}`);
              }
              if (platforms.size === 1) canonicalTarget = canonicalTargets.get([...platforms][0]) ?? '';
            }
            if (canonicalTarget) targetRows.push({ name: archiveName, target: canonicalTarget });
          }
          if (directories.length === 0) throw new Error('GoReleaser produced no release archive directories');

          const packageArtifacts = artifacts.filter((artifact) => artifact.type === 'Linux Package');
          if (!nfpmEnabled && packageArtifacts.length > 0) {
            throw new Error('GoReleaser emitted nFPM packages while nfpm mode is disabled');
          }
          if (nfpmEnabled && packageArtifacts.length === 0) {
            throw new Error('nFPM mode is enabled but GoReleaser emitted no Linux Package artifacts');
          }
          const packageRows = [];
          const packageNames = new Set();
          for (const artifact of packageArtifacts) {
            const name = artifact.name;
            const artifactPath = artifact.path;
            if (typeof name !== 'string' || typeof artifactPath !== 'string' || path.basename(artifactPath) !== name) {
              throw new Error('nFPM artifact name/path mismatch');
            }
            const match = name.match(/^[A-Za-z0-9][A-Za-z0-9+@._-]*\.(deb|rpm)$/);
            if (!match) throw new Error(`unsupported or unsafe nFPM package filename: ${name}`);
            if (artifact.goos !== 'linux' ||
                typeof artifact.goarch !== 'string' ||
                !/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(artifact.goarch)) {
              throw new Error(`nFPM package lacks a safe Linux architecture: ${name}`);
            }
            const source = path.resolve(artifactPath);
            if (path.dirname(source) !== distDirectory) {
              throw new Error(`nFPM package must be a top-level dist artifact: ${name}`);
            }
            const sourceStat = fs.lstatSync(source);
            if (!sourceStat.isFile() || sourceStat.isSymbolicLink()) {
              throw new Error(`nFPM package must be a regular file: ${name}`);
            }
            if (packageNames.has(name) || fs.existsSync(path.join(releaseDirectory, name))) {
              throw new Error(`duplicate release asset name: ${name}`);
            }
            packageNames.add(name);
            fs.copyFileSync(source, path.join(releaseDirectory, name), fs.constants.COPYFILE_EXCL);
            packageRows.push({
              name,
              platform: `linux_${artifact.goarch}`,
              format: match[1],
            });
          }
          targetRows.sort((left, right) => left.name.localeCompare(right.name));
          packageRows.sort((left, right) => left.name.localeCompare(right.name));
          fs.writeFileSync(
            path.join(releaseDirectory, '.ASSET-TARGETS.json'),
            `${JSON.stringify(targetRows, null, 2)}\n`,
          );
          fs.writeFileSync(
            path.join(releaseDirectory, '.NFPM-PACKAGES.json'),
            `${JSON.stringify(packageRows, null, 2)}\n`,
          );
          // artifact-assembler-end
          NODE
          tar -czf signed-release-assets.tar.gz release-assets
      - name: Upload signed release payload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: signed-release-assets-${{ github.run_id }}
          path: signed-release-assets.tar.gz
          if-no-files-found: error
          retention-days: 1
      - name: Restore user keychain search list
        if: always()
        env:
          KEYCHAIN: ${{ steps.signer.outputs.keychain }}
        run: |
          set -euo pipefail
          cleanup_failed=0
          search_list_file="$RUNNER_TEMP/release-original-user-keychains.txt"
          original_keychains=()
          if [[ -f "$search_list_file" ]]; then
            while IFS= read -r existing_keychain; do
              [[ -n "$existing_keychain" ]] && original_keychains+=("$existing_keychain")
            done <"$search_list_file"
            if ! security list-keychains -d user -s "${original_keychains[@]}"; then
              echo "could not restore user keychain search list" >&2
              cleanup_failed=1
            fi
          fi

          keychain=${KEYCHAIN:-"$RUNNER_TEMP/release-signing.keychain-db"}
          if [[ -e "$keychain" ]] && ! security delete-keychain "$keychain"; then
            echo "could not delete ephemeral signing keychain" >&2
            cleanup_failed=1
          fi
          rm -f "$search_list_file" "$RUNNER_TEMP/release-signing.p12"
          exit "$cleanup_failed"

  draft:
    name: 4 · Create exact draft
    needs: [validate, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.release.outputs.release-id }}
      verification-artifact-name: ${{ steps.verification-payload.outputs.artifact-name }}
    steps:
      - name: Download frozen release notes
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ needs.validate.outputs.release-notes-artifact-name }}
          path: validated-release-notes
      - name: Download signed payload
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: signed-release-assets-${{ github.run_id }}
      - name: Create frozen inventory and checksums
        env:
          HOMEBREW_FORMULA: ${{ inputs.homebrew-formula }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
        run: |
          set -euo pipefail
          tar -xzf signed-release-assets.tar.gz
          [[ -s validated-release-notes/RELEASE-NOTES.md ]] || { echo "validated release notes missing" >&2; exit 1; }
          cp validated-release-notes/RELEASE-NOTES.md release-assets/RELEASE-NOTES.md
          target_map="$RUNNER_TEMP/ASSET-TARGETS.json"
          package_map="$RUNNER_TEMP/NFPM-PACKAGES.json"
          mv release-assets/.ASSET-TARGETS.json "$target_map"
          mv release-assets/.NFPM-PACKAGES.json "$package_map"
          ASSET_TARGETS_PATH="$target_map" NFPM_PACKAGES_PATH="$package_map" node <<'NODE'
          // asset-inventory-builder-begin
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');

          const releaseDirectory = path.resolve('release-assets');
          const readJsonArray = (file, label) => {
            const value = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (!Array.isArray(value)) throw new Error(`${label} must be an array`);
            return value;
          };
          const exactKeys = (value, expected) =>
            Object.keys(value).sort().join('\0') === [...expected].sort().join('\0');
          const requireRegularAsset = (name, label) => {
            const assetPath = path.join(releaseDirectory, name);
            const stat = fs.lstatSync(assetPath);
            if (!stat.isFile() || stat.isSymbolicLink()) throw new Error(`${label} is not a regular file: ${name}`);
            return assetPath;
          };
          const digest = (file) => crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex');

          const targetRows = readJsonArray(process.env.ASSET_TARGETS_PATH, 'asset target map');
          const targetNames = new Set();
          const targets = new Set();
          for (const row of targetRows) {
            if (row === null || typeof row !== 'object' || !exactKeys(row, ['name', 'target']) ||
                typeof row.name !== 'string' ||
                !/^[A-Za-z0-9][A-Za-z0-9+@._-]*\.tar\.gz$/.test(row.name) ||
                typeof row.target !== 'string' ||
                !/^(?:(?:darwin|linux|windows)_(?:amd64|arm64)|darwin_universal)$/.test(row.target)) {
              throw new Error('asset target map contains an invalid row');
            }
            if (targetNames.has(row.name) || targets.has(row.target)) {
              throw new Error('asset target map contains a duplicate name or target');
            }
            requireRegularAsset(row.name, 'target archive');
            targetNames.add(row.name);
            targets.add(row.target);
          }

          const packageRows = readJsonArray(process.env.NFPM_PACKAGES_PATH, 'nFPM package map');
          const packageNames = new Set();
          for (const row of packageRows) {
            if (row === null || typeof row !== 'object' || !exactKeys(row, ['format', 'name', 'platform']) ||
                typeof row.name !== 'string' ||
                !/^[A-Za-z0-9][A-Za-z0-9+@._-]*\.(?:deb|rpm)$/.test(row.name) ||
                typeof row.platform !== 'string' || !/^linux_[A-Za-z0-9][A-Za-z0-9._-]*$/.test(row.platform) ||
                !['deb', 'rpm'].includes(row.format) || !row.name.endsWith(`.${row.format}`)) {
              throw new Error('nFPM package map contains an invalid row');
            }
            if (packageNames.has(row.name) || targetNames.has(row.name)) {
              throw new Error(`duplicate inventory asset name: ${row.name}`);
            }
            requireRegularAsset(row.name, 'nFPM package');
            packageNames.add(row.name);
          }

          if (process.env.HOMEBREW_FORMULA) {
            for (const target of ['darwin_amd64', 'darwin_arm64', 'linux_amd64', 'linux_arm64']) {
              if (!targets.has(target)) {
                throw new Error(`Homebrew handoff requires exactly one GoReleaser archive for ${target}`);
              }
            }
          }

          const names = fs.readdirSync(releaseDirectory).sort();
          if (names.includes('ASSET-INVENTORY.json') || names.includes('SHA256SUMS')) {
            throw new Error('release controls already exist before inventory creation');
          }
          for (const name of names) {
            requireRegularAsset(name, 'release asset');
            if (/\.(?:deb|rpm)$/.test(name) && !packageNames.has(name)) {
              throw new Error(`unmapped nFPM package asset: ${name}`);
            }
          }
          const targetByName = new Map(targetRows.map((row) => [row.name, row.target]));
          const packageByName = new Map(packageRows.map((row) => [row.name, row]));
          const payloads = names.map((name) => {
            const file = path.join(releaseDirectory, name);
            const payload = { name, size: fs.statSync(file).size, sha256: digest(file) };
            if (targetByName.has(name)) payload.target = targetByName.get(name);
            if (packageByName.has(name)) {
              const packageRow = packageByName.get(name);
              payload.kind = 'nfpm';
              payload.packageFormat = packageRow.format;
              payload.platform = packageRow.platform;
            }
            return payload;
          });
          const inventory = {
            schemaVersion: 1,
            repository: process.env.GITHUB_REPOSITORY,
            tag: process.env.TAG,
            commit: process.env.TARGET_SHA,
            payloads,
          };
          fs.writeFileSync(
            path.join(releaseDirectory, 'ASSET-INVENTORY.json'),
            `${JSON.stringify(inventory, null, 2)}\n`,
          );
          const checksumNames = [...names, 'ASSET-INVENTORY.json'].sort();
          const checksums = checksumNames
            .map((name) => `${digest(path.join(releaseDirectory, name))}  ${name}\n`)
            .join('');
          fs.writeFileSync(path.join(releaseDirectory, 'SHA256SUMS'), checksums);
          // asset-inventory-builder-end
          NODE

      - name: Package immutable verification payload
        id: verification-payload
        run: |
          set -euo pipefail
          tar -czf release-verification-payload.tar.gz release-assets
          echo "artifact-name=release-verification-payload-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >>"$GITHUB_OUTPUT"
      - name: Upload immutable verification payload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ steps.verification-payload.outputs.artifact-name }}
          path: release-verification-payload.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Create draft and upload exact assets
        id: release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release-version }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const directory = 'release-assets';
            const names = fs.readdirSync(directory).sort();
            if (!names.includes('ASSET-INVENTORY.json') || !names.includes('RELEASE-NOTES.md') || !names.includes('SHA256SUMS')) {
              core.setFailed('release controls missing');
              return;
            }
            // The frozen annotated tag already exists (freeze stage), so GitHub
            // resolves the release commit from the tag. target_commitish with a
            // raw SHA is rejected (403) for the Actions integration token, and
            // would be ignored for an existing tag anyway. We assert the tag's
            // peeled commit below instead.
            const tagRef = await github.rest.git.getRef({ ...context.repo, ref: `tags/${process.env.TAG}` });
            let peeled = tagRef.data.object.sha;
            if (tagRef.data.object.type === 'tag') {
              const tagObj = await github.rest.git.getTag({ ...context.repo, tag_sha: peeled });
              peeled = tagObj.data.object.sha;
            }
            if (peeled !== process.env.TARGET_SHA) {
              core.setFailed(`frozen tag ${process.env.TAG} peels to ${peeled}, expected ${process.env.TARGET_SHA}`);
              return;
            }
            const release = await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: process.env.TAG,
              name: process.env.TAG,
              body: '',
              draft: true,
              prerelease: process.env.RELEASE_VERSION.includes('-'),
            });
            for (const name of names) {
              const file = path.join(directory, name);
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                ...context.repo,
                release_id: release.data.id,
                name,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length,
                },
              });
            }
            core.setOutput('release-id', String(release.data.id));

  verify:
    name: 5 · Independent verify (${{ matrix.arch }})
    needs: [validate, draft]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read
    steps:
      - name: Download immutable verification payload
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ needs.draft.outputs.verification-artifact-name }}
      - name: Extract immutable verification payload
        run: |
          set -euo pipefail
          tar -xzf release-verification-payload.tar.gz

      - name: Verify exact inventory, signatures, DR, and notarization
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
          HOMEBREW_FORMULA: ${{ inputs.homebrew-formula }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_TYPE: ${{ inputs.repository-type }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
          VERIFICATION_PAYLOAD_ARTIFACT: ${{ needs.draft.outputs.verification-artifact-name }}
        run: |
          set -euo pipefail
          unset GH_TOKEN GITHUB_TOKEN ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_RUNTIME_TOKEN ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY_P8 MACOS_SIGNING_P12 MACOS_SIGNING_P12_PASSWORD TAP_TOKEN
          cd release-assets
          [[ -f ASSET-INVENTORY.json && -s RELEASE-NOTES.md && -f SHA256SUMS && -f SIGNING-MANIFEST.json ]]
          [[ "$(jq -r '.repository' ASSET-INVENTORY.json)" == "$GITHUB_REPOSITORY" ]]
          [[ "$(jq -r '.tag' ASSET-INVENTORY.json)" == "$TAG" ]]
          [[ "$(jq -r '.commit' ASSET-INVENTORY.json)" == "$TARGET_SHA" ]]

          # signature-assertion-helpers-begin
          signature_diagnostic_value() {
            local value=$1
            value=$(printf '%s' "$value" | tr '\r\n\t' '   ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')
            [[ -n "$value" ]] || value='<missing>'
            printf '%s' "$value"
          }

          fail_signature_assertion() {
            local label=$1
            local expected=$2
            local observed=$3
            local subject=$4
            expected=$(signature_diagnostic_value "$expected")
            observed=$(signature_diagnostic_value "$observed")
            printf 'signature assertion failed [%s] for %s\n' "$label" "$subject" >&2
            printf '  expected (public metadata): %s\n' "$expected" >&2
            printf '  observed (public metadata): %s\n' "$observed" >&2
            return 1
          }

          codesign_display_value() {
            local key=$1
            local display=$2
            awk -v key="$key" '
              index($0, key "=") == 1 {
                print substr($0, length(key) + 2)
                exit
              }
            ' <<<"$display"
          }

          codesign_display_values() {
            local key=$1
            local display=$2
            awk -v key="$key" '
              index($0, key "=") == 1 {
                print substr($0, length(key) + 2)
              }
            ' <<<"$display"
          }

          normalize_designated_requirement() {
            local value=$1
            printf '%s\n' "$value" \
              | sed -E '/^[[:space:]]*Executable=/d' \
              | tr '\r\n\t' '   ' \
              | sed -E 's|/\* exists \*/|exists|g; s/[[:space:]]+/ /g; s/"([A-Za-z0-9.]+)"/\1/g; s/ Executable=.*$//; s/^ //; s/ $//'
          }

          assert_signature_equal() {
            local label=$1
            local expected=$2
            local observed=$3
            local subject=$4
            [[ "$observed" == "$expected" ]] \
              || fail_signature_assertion "$label" "$expected" "$observed" "$subject"
          }

          assert_signature_line_present() {
            local label=$1
            local expected=$2
            local observed=$3
            local subject=$4
            awk -v expected="$expected" '$0 == expected { found = 1 } END { exit(found ? 0 : 1) }' <<<"$observed" \
              || fail_signature_assertion "$label" "$expected" "$observed" "$subject"
          }

          assert_signature_runtime() {
            local label=$1
            local observed=$2
            local subject=$3
            [[ "$observed" == *flags=* && "$observed" == *'(runtime)'* ]] \
              || fail_signature_assertion "$label" 'CodeDirectory flags containing (runtime)' "$observed" "$subject"
          }

          assert_signature_timestamp() {
            local label=$1
            local observed=$2
            local subject=$3
            [[ -n "$observed" && "$observed" != none ]] \
              || fail_signature_assertion "$label" 'nonempty trusted timestamp' "$observed" "$subject"
          }
          # signature-assertion-helpers-end

          expected_names=$(jq -r '.payloads[].name, "ASSET-INVENTORY.json", "SHA256SUMS"' ASSET-INVENTORY.json | LC_ALL=C sort)
          actual_names=$(find . -mindepth 1 -maxdepth 1 -type f -exec basename {} \; | LC_ALL=C sort)
          [[ "$actual_names" == "$expected_names" ]] || {
            diff -u <(printf '%s\n' "$expected_names") <(printf '%s\n' "$actual_names") >&2 || true
            exit 1
          }
          checksum_names=$(awk 'NF == 2 { sub(/^\*/, "", $2); print $2 }' SHA256SUMS | LC_ALL=C sort)
          expected_checksum_names=$(printf '%s\n' "$actual_names" | grep -v '^SHA256SUMS$')
          [[ "$checksum_names" == "$expected_checksum_names" ]]
          shasum -a 256 -c SHA256SUMS
          while IFS=$'\t' read -r name size digest; do
            [[ "$(stat -f %z "$name")" == "$size" ]]
            [[ "$(shasum -a 256 "$name" | awk '{print $1}')" == "$digest" ]]
          done < <(jq -r '.payloads[] | [.name,.size,.sha256] | @tsv' ASSET-INVENTORY.json)

          # nfpm-checksum-verifier-begin
          jq -e '
            all(.payloads[];
              if (.kind? == "nfpm") then
                (.name | test("^[A-Za-z0-9][A-Za-z0-9+@._-]*\\.(deb|rpm)$")) and
                (.packageFormat == "deb" or .packageFormat == "rpm") and
                (.packageFormat as $format | .name | endswith("." + $format)) and
                (.platform | type == "string" and test("^linux_[A-Za-z0-9][A-Za-z0-9._-]*$")) and
                (has("target") | not)
              elif has("kind") or has("packageFormat") or has("platform") then
                false
              else
                true
              end)
          ' ASSET-INVENTORY.json >/dev/null
          inventory_package_names=$(jq -r '.payloads[] | select(.kind? == "nfpm") | .name' ASSET-INVENTORY.json | LC_ALL=C sort)
          actual_package_names=$(find . -mindepth 1 -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' \) -exec basename {} \; | LC_ALL=C sort)
          [[ "$actual_package_names" == "$inventory_package_names" ]] || {
            echo "nFPM package inventory mismatch" >&2
            diff -u <(printf '%s\n' "$inventory_package_names") <(printf '%s\n' "$actual_package_names") >&2 || true
            exit 1
          }
          if [[ -n "$inventory_package_names" ]]; then
            echo "verified nFPM package payloads by inventory-bound SHA-256; package files are not Apple code-signed"
          fi
          # nfpm-checksum-verifier-end

          if [[ -n "$HOMEBREW_FORMULA" ]]; then
            for target in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
              [[ "$(jq --arg target "$target" '[.payloads[] | select(.target == $target)] | length' ASSET-INVENTORY.json)" == 1 ]] || {
                echo "verified inventory does not contain exactly one $target archive" >&2
                exit 1
              }
            done
            while IFS=$'\t' read -r archive target; do
              target_extract="$RUNNER_TEMP/verify-target-$target"
              rm -rf "$target_extract"
              mkdir -p "$target_extract"
              tar -xzf "$archive" -C "$target_extract"
              target_matches=0
              while IFS= read -r -d '' candidate; do
                description=$(file "$candidate")
                case "$target" in
                  darwin_amd64)
                    [[ "$description" == *Mach-O* && " $(lipo -archs "$candidate") " == *' x86_64 '* ]] && target_matches=$((target_matches + 1))
                    ;;
                  darwin_arm64)
                    [[ "$description" == *Mach-O* && " $(lipo -archs "$candidate") " == *' arm64 '* ]] && target_matches=$((target_matches + 1))
                    ;;
                  linux_amd64)
                    [[ "$description" == *ELF* && "$description" == *x86-64* ]] && target_matches=$((target_matches + 1))
                    ;;
                  linux_arm64)
                    [[ "$description" == *ELF* && ( "$description" == *aarch64* || "$description" == *arm64* ) ]] && target_matches=$((target_matches + 1))
                    ;;
                esac
              done < <(find "$target_extract" -type f -perm -111 -print0)
              (( target_matches > 0 )) || {
                echo "inventory target $target does not match archive contents: $archive" >&2
                exit 1
              }
            done < <(jq -r '.payloads[] | select(.target == "darwin_amd64" or .target == "darwin_arm64" or .target == "linux_amd64" or .target == "linux_arm64") | [.name,.target] | @tsv' ASSET-INVENTORY.json)
          fi

          if [[ "$REPOSITORY_TYPE" == openclaw ]]; then
            team_id=FWJYW4S8P8
            authority="Developer ID Application: OpenClaw Foundation ($team_id)"
            identifier_prefix=org.openclaw
          else
            team_id=Y5PE65HELJ
            authority="Developer ID Application: Peter Steinberger ($team_id)"
            identifier_prefix=com.steipete
          fi

          work="$RUNNER_TEMP/verify-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-$EXPECTED_ARCH"
          mkdir -p "$work"
          native_count=0
          universal_count=0
          verified_count=0
          for archive in *.tar.gz; do
            extract="$work/${archive%.tar.gz}"
            mkdir -p "$extract"
            tar -xzf "$archive" -C "$extract"
            while IFS= read -r -d '' candidate; do
              file "$candidate" | grep -q 'Mach-O' || continue
              binary_slug=$(basename "$candidate" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g; s/^-+|-+$//g')
              repo_slug=$(printf '%s' "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g; s/^-+|-+$//g')
              identifier="$identifier_prefix.$repo_slug.$binary_slug"
              requirement="identifier \"$identifier\" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] exists and certificate leaf[field.1.2.840.113635.100.6.1.13] exists and certificate leaf[subject.OU] = \"$team_id\""
              codesign --verify --strict -R="$requirement" --verbose=2 "$candidate"
              signature=$(codesign -dvvv "$candidate" 2>&1)
              observed_identifier=$(codesign_display_value Identifier "$signature")
              observed_authorities=$(codesign_display_values Authority "$signature")
              observed_team_id=$(codesign_display_value TeamIdentifier "$signature")
              observed_code_directory=$(awk '/^CodeDirectory / { print; exit }' <<<"$signature")
              observed_timestamp=$(codesign_display_value Timestamp "$signature")
              assert_signature_equal "identifier" "$identifier" "$observed_identifier" "$candidate"
              assert_signature_line_present "authority-application" "$authority" "$observed_authorities" "$candidate"
              assert_signature_line_present "authority-developer-id-ca" 'Developer ID Certification Authority' "$observed_authorities" "$candidate"
              assert_signature_line_present "authority-apple-root-ca" 'Apple Root CA' "$observed_authorities" "$candidate"
              assert_signature_equal "team-id" "$team_id" "$observed_team_id" "$candidate"
              assert_signature_runtime "hardened-runtime" "$observed_code_directory" "$candidate"
              assert_signature_timestamp "trusted-timestamp" "$observed_timestamp" "$candidate"
              embedded=$(codesign -d -r- "$candidate" 2>&1)
              expected_requirement=$(normalize_designated_requirement "designated => $requirement")
              observed_requirement=$(normalize_designated_requirement "$embedded")
              assert_signature_equal "designated-requirement" "$expected_requirement" "$observed_requirement" "$candidate"
              ready=0
              for _ in {1..12}; do
                if codesign --verify --strict --check-notarization -R=notarized --verbose=2 "$candidate"; then
                  ready=1
                  break
                fi
                sleep 5
              done
              (( ready == 1 )) || { echo "notarization ticket unavailable: $candidate" >&2; exit 1; }
              # SecAssessment's execute policy classifies app bundles. It rejects
              # valid bare Mach-O CLIs as "not an app", so the codesign online
              # notarization check above is the CLI distribution-policy proof.
              if [[ -d "$candidate" && "$candidate" == *.app ]]; then
                spctl --assess --type execute --verbose=2 "$candidate"
              fi
              archs=" $(lipo -archs "$candidate") "
              [[ "$archs" == *" $EXPECTED_ARCH "* ]] && native_count=$((native_count + 1))
              [[ "$archs" == *' arm64 '* && "$archs" == *' x86_64 '* ]] && universal_count=$((universal_count + 1))
              jq -e --arg identifier "$identifier" --arg authority "$authority" --arg team "$team_id" \
                '.binaries[] | select(.identifier == $identifier and .authority == $authority and .teamId == $team and .hardenedRuntime == true and .notarized == true)' \
                SIGNING-MANIFEST.json >/dev/null
              verified_count=$((verified_count + 1))
            done < <(find "$extract" -type f -perm -111 -print0)
          done
          (( verified_count > 0 && native_count > 0 && universal_count > 0 )) || {
            echo "missing verified macOS payload for $EXPECTED_ARCH or universal architecture" >&2
            exit 1
          }

          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg verifierRunAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg payloadArtifact "$VERIFICATION_PAYLOAD_ARTIFACT" \
            --arg tag "$TAG" \
            --arg commit "$TARGET_SHA" \
            --arg architecture "$EXPECTED_ARCH" \
            --rawfile assetInventory ASSET-INVENTORY.json \
            --rawfile releaseNotes RELEASE-NOTES.md \
            --rawfile sha256sums SHA256SUMS \
            '{schemaVersion:1,repository:$repository,runId:$runId,verifierRunAttempt:$verifierRunAttempt,payloadArtifact:$payloadArtifact,tag:$tag,commit:$commit,architecture:$architecture,verdict:"verified",assetInventory:$assetInventory,releaseNotes:$releaseNotes,sha256sums:$sha256sums}' \
            >"$RUNNER_TEMP/verified-inventory-attestation.json"

      - name: Upload verified inventory attestation
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: verified-inventory-${{ matrix.arch }}-${{ needs.draft.outputs.verification-artifact-name }}
          path: ${{ runner.temp }}/verified-inventory-attestation.json
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  publish:
    name: 6 · Publish verified draft
    needs: [validate, draft, verify]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    outputs:
      release-url: ${{ steps.publish.outputs.release-url }}
    steps:
      - name: Download arm64 verified inventory attestation
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: verified-inventory-arm64-${{ needs.draft.outputs.verification-artifact-name }}
          path: verified-inventory-attestations/arm64
      - name: Download x86_64 verified inventory attestation
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: verified-inventory-x86_64-${{ needs.draft.outputs.verification-artifact-name }}
          path: verified-inventory-attestations/x86_64
      - name: Bind draft bytes to verified inventory and publish
        id: publish
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RELEASE_ID: ${{ needs.draft.outputs.release-id }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
          VERIFICATION_PAYLOAD_ARTIFACT: ${{ needs.draft.outputs.verification-artifact-name }}
        with:
          script: |
            const crypto = require('crypto');
            const fs = require('fs');
            const releaseId = Number(process.env.RELEASE_ID);
            if (!Number.isSafeInteger(releaseId) || releaseId <= 0) {
              throw new Error('invalid numeric release id');
            }

            const attestationPaths = {
              arm64: 'verified-inventory-attestations/arm64/verified-inventory-attestation.json',
              x86_64: 'verified-inventory-attestations/x86_64/verified-inventory-attestation.json',
            };
            const attestations = Object.fromEntries(Object.entries(attestationPaths).map(([architecture, file]) => {
              const attestation = JSON.parse(fs.readFileSync(file, 'utf8'));
              const expected = {
                repository: `${context.repo.owner}/${context.repo.repo}`,
                runId: process.env.GITHUB_RUN_ID,
                payloadArtifact: process.env.VERIFICATION_PAYLOAD_ARTIFACT,
                tag: process.env.TAG,
                commit: process.env.TARGET_SHA,
                architecture,
                verdict: 'verified',
              };
              for (const [field, value] of Object.entries(expected)) {
                if (attestation[field] !== value) {
                  throw new Error(`${architecture} attestation ${field} mismatch: observed ${JSON.stringify(attestation[field])}, expected ${JSON.stringify(value)}`);
                }
              }
              if (attestation.schemaVersion !== 1 || typeof attestation.assetInventory !== 'string' ||
                  attestation.assetInventory.length === 0 || typeof attestation.releaseNotes !== 'string' ||
                  attestation.releaseNotes.length === 0 || typeof attestation.sha256sums !== 'string') {
                throw new Error(`${architecture} attestation schema, asset inventory, release notes, or SHA256SUMS is invalid`);
              }
              return [architecture, attestation];
            }));
            if (attestations.arm64.sha256sums !== attestations.x86_64.sha256sums) {
              throw new Error('verified SHA256SUMS differs between arm64 and x86_64 attestations');
            }
            if (attestations.arm64.releaseNotes !== attestations.x86_64.releaseNotes) {
              throw new Error('verified release notes differ between arm64 and x86_64 attestations');
            }
            if (attestations.arm64.assetInventory !== attestations.x86_64.assetInventory) {
              throw new Error('verified asset inventory differs between arm64 and x86_64 attestations');
            }

            const verifiedSha256sums = attestations.arm64.sha256sums;
            const verifiedAssetInventory = attestations.arm64.assetInventory;
            const verifiedReleaseNotes = attestations.arm64.releaseNotes;
            if (!verifiedSha256sums.endsWith('\n')) {
              throw new Error('verified SHA256SUMS must end with exactly one complete checksum line');
            }
            const checksumLines = verifiedSha256sums.slice(0, -1).split('\n');
            if (checksumLines.length === 0 || checksumLines.some((line) => line.length === 0)) {
              throw new Error('verified SHA256SUMS contains an empty line');
            }
            const expectedDigests = new Map();
            for (const line of checksumLines) {
              const match = /^([0-9a-f]{64})  ([^\r\n]+)$/.exec(line);
              if (!match) throw new Error(`invalid SHA256SUMS line: ${JSON.stringify(line)}`);
              const [, digest, name] = match;
              if (name === 'SHA256SUMS' || name.includes('/') || name.includes('\\') || expectedDigests.has(name)) {
                throw new Error(`unsafe or duplicate SHA256SUMS asset name: ${JSON.stringify(name)}`);
              }
              expectedDigests.set(name, digest);
            }

            const before = await github.rest.repos.getRelease({ ...context.repo, release_id: releaseId });
            if (!before.data.draft || before.data.tag_name !== process.env.TAG) {
              throw new Error('draft identity changed before content binding');
            }
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              ...context.repo,
              release_id: releaseId,
              per_page: 100,
            });
            const downloaded = new Map();
            for (const asset of assets) {
              if (downloaded.has(asset.name)) {
                throw new Error(`duplicate draft asset name: ${JSON.stringify(asset.name)}`);
              }
              const response = await github.request('GET /repos/{owner}/{repo}/releases/assets/{asset_id}', {
                ...context.repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' },
              });
              downloaded.set(asset.name, Buffer.from(response.data));
            }

            const expectedNames = [...expectedDigests.keys(), 'SHA256SUMS'].sort();
            const observedNames = [...downloaded.keys()].sort();
            if (JSON.stringify(observedNames) !== JSON.stringify(expectedNames)) {
              const missing = expectedNames.filter((name) => !downloaded.has(name));
              const extra = observedNames.filter((name) => !expectedNames.includes(name));
              throw new Error(`draft asset inventory mismatch: missing=${JSON.stringify(missing)} extra=${JSON.stringify(extra)}`);
            }
            const draftSha256sums = downloaded.get('SHA256SUMS').toString('utf8');
            if (draftSha256sums !== verifiedSha256sums) {
              throw new Error('draft SHA256SUMS bytes differ from verified attestation');
            }
            for (const [name, expectedDigest] of expectedDigests) {
              const observedDigest = crypto.createHash('sha256').update(downloaded.get(name)).digest('hex');
              if (observedDigest !== expectedDigest) {
                throw new Error(`draft asset digest mismatch for ${JSON.stringify(name)}: observed ${observedDigest}, expected ${expectedDigest}`);
              }
            }
            if (!downloaded.has('RELEASE-NOTES.md') ||
                !downloaded.get('RELEASE-NOTES.md').equals(Buffer.from(verifiedReleaseNotes, 'utf8'))) {
              throw new Error('draft RELEASE-NOTES.md bytes differ from verified attestation');
            }
            if (!downloaded.has('ASSET-INVENTORY.json') ||
                !downloaded.get('ASSET-INVENTORY.json').equals(Buffer.from(verifiedAssetInventory, 'utf8'))) {
              throw new Error('draft ASSET-INVENTORY.json bytes differ from verified attestation');
            }

            const ref = await github.rest.git.getRef({ ...context.repo, ref: `tags/${process.env.TAG}` });
            if (ref.data.object.type !== 'tag') {
              throw new Error('release tag is no longer annotated or signed');
            }
            const tagObject = await github.rest.git.getTag({ ...context.repo, tag_sha: ref.data.object.sha });
            if (tagObject.data.object.type !== 'commit' || tagObject.data.object.sha !== process.env.TARGET_SHA) {
              throw new Error('frozen tag target changed before publication');
            }
            const published = await github.rest.repos.updateRelease({
              ...context.repo,
              release_id: releaseId,
              body: verifiedReleaseNotes,
              draft: false,
            });
            if (published.data.draft || !published.data.published_at || published.data.body !== verifiedReleaseNotes) {
              core.setFailed('release did not become published');
              return;
            }
            core.setOutput('release-url', published.data.html_url);
      - name: Verify public release state
        env:
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          response=$(curl --fail --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")
          [[ "$(jq -r '.draft' <<<"$response")" == false ]]
          [[ "$(jq -r '.tag_name' <<<"$response")" == "$TAG" ]]
          [[ "$(jq -r '.published_at' <<<"$response")" != null ]]

  handoff:
    name: 7 · Homebrew handoff
    if: inputs.homebrew-formula != ''
    needs: [validate, draft, publish]
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Download arm64 verification attestation
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: verified-inventory-arm64-${{ needs.draft.outputs.verification-artifact-name }}
          path: verified-inventory-attestations/arm64
      - name: Download x86_64 verification attestation
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: verified-inventory-x86_64-${{ needs.draft.outputs.verification-artifact-name }}
          path: verified-inventory-attestations/x86_64
      - name: Dispatch configured tap and verify formula hashes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          FORMULA: ${{ inputs.homebrew-formula }}
          HOMEBREW_TAP: ${{ needs.validate.outputs.homebrew-tap }}
          SOURCE_DEFAULT_BRANCH: ${{ needs.validate.outputs.default-branch }}
          TAG: ${{ needs.validate.outputs.tag }}
          TAP_TOKEN_PRESENT: ${{ secrets.TAP_TOKEN != '' }}
          TARGET_SHA: ${{ needs.validate.outputs.target-sha }}
          VERIFICATION_PAYLOAD_ARTIFACT: ${{ needs.draft.outputs.verification-artifact-name }}
        with:
          github-token: ${{ secrets.TAP_TOKEN }}
          script: |
            if (process.env.TAP_TOKEN_PRESENT !== 'true') {
              core.setFailed('TAP_TOKEN is required when homebrew-formula is set');
              return;
            }

            const fs = require('fs');
            const { execFileSync } = require('child_process');
            const repository = `${context.repo.owner}/${context.repo.repo}`;
            const expectedAttestation = {
              repository,
              runId: String(context.runId),
              payloadArtifact: process.env.VERIFICATION_PAYLOAD_ARTIFACT,
              tag: process.env.TAG,
              commit: process.env.TARGET_SHA,
              verdict: 'verified',
            };
            const attestations = Object.fromEntries(['arm64', 'x86_64'].map((architecture) => {
              const attestation = JSON.parse(fs.readFileSync(
                `verified-inventory-attestations/${architecture}/verified-inventory-attestation.json`,
                'utf8',
              ));
              for (const [field, value] of Object.entries({ ...expectedAttestation, architecture })) {
                if (attestation[field] !== value) {
                  throw new Error(`${architecture} attestation ${field} mismatch`);
                }
              }
              if (attestation.schemaVersion !== 1 || typeof attestation.assetInventory !== 'string' ||
                  typeof attestation.sha256sums !== 'string') {
                throw new Error(`${architecture} attestation schema, asset inventory, or SHA256SUMS is invalid`);
              }
              return [architecture, attestation];
            }));
            if (attestations.arm64.sha256sums !== attestations.x86_64.sha256sums) {
              throw new Error('verified SHA256SUMS differs between arm64 and x86_64 attestations');
            }
            if (attestations.arm64.assetInventory !== attestations.x86_64.assetInventory) {
              throw new Error('verified asset inventory differs between arm64 and x86_64 attestations');
            }

            const expectedDigests = new Map();
            const checksumLines = attestations.arm64.sha256sums.trimEnd().split('\n');
            for (const line of checksumLines) {
              const match = line.match(/^([0-9a-f]{64})  ([^\r\n]+)$/);
              if (!match) throw new Error(`invalid verified SHA256SUMS line: ${JSON.stringify(line)}`);
              const [, digest, name] = match;
              if (expectedDigests.has(name)) throw new Error(`duplicate verified checksum name: ${name}`);
              expectedDigests.set(name, digest);
            }
            if (expectedDigests.size === 0) throw new Error('verified SHA256SUMS is empty');

            let assetInventory;
            try {
              assetInventory = JSON.parse(attestations.arm64.assetInventory);
            } catch (error) {
              throw new Error(`verified ASSET-INVENTORY.json is invalid JSON: ${error.message}`);
            }
            if (assetInventory.schemaVersion !== 1 || assetInventory.repository !== repository ||
                assetInventory.tag !== process.env.TAG || assetInventory.commit !== process.env.TARGET_SHA ||
                !Array.isArray(assetInventory.payloads)) {
              throw new Error('verified ASSET-INVENTORY.json identity or schema mismatch');
            }
            const inventoryNames = new Set();
            const homebrewAssets = {};
            const homebrewTargets = new Set(['darwin_amd64', 'darwin_arm64', 'linux_amd64', 'linux_arm64']);
            const permittedTargets = new Set([...homebrewTargets, 'darwin_universal', 'windows_amd64', 'windows_arm64']);
            for (const payload of assetInventory.payloads) {
              if (!payload || typeof payload.name !== 'string' || !Number.isSafeInteger(payload.size) || payload.size < 0 ||
                  typeof payload.sha256 !== 'string' || !/^[0-9a-f]{64}$/.test(payload.sha256) ||
                  payload.name.includes('/') || payload.name.includes('\\') || inventoryNames.has(payload.name)) {
                throw new Error('verified ASSET-INVENTORY.json contains an unsafe or duplicate payload');
              }
              inventoryNames.add(payload.name);
              if (expectedDigests.get(payload.name) !== payload.sha256) {
                throw new Error(`verified inventory/checksum mismatch for ${payload.name}`);
              }
              if (payload.target !== undefined) {
                if (typeof payload.target !== 'string' || !permittedTargets.has(payload.target)) {
                  throw new Error(`verified inventory has invalid target for ${payload.name}`);
                }
                if (homebrewTargets.has(payload.target)) {
                  if (homebrewAssets[payload.target]) {
                    throw new Error(`verified inventory has duplicate ${payload.target} assets`);
                  }
                  if (!/^[A-Za-z0-9][A-Za-z0-9+@._-]*\.tar\.gz$/.test(payload.name)) {
                    throw new Error(`verified ${payload.target} asset has an unsafe filename`);
                  }
                  homebrewAssets[payload.target] = { name: payload.name, sha256: payload.sha256 };
                }
              }
            }
            const expectedInventoryNames = [...expectedDigests.keys()].filter((name) => name !== 'ASSET-INVENTORY.json').sort();
            if (JSON.stringify([...inventoryNames].sort()) !== JSON.stringify(expectedInventoryNames)) {
              throw new Error('verified inventory payload names differ from SHA256SUMS');
            }
            const missingHomebrewTargets = [...homebrewTargets].filter((target) => !homebrewAssets[target]);
            if (missingHomebrewTargets.length > 0) {
              throw new Error(`verified inventory lacks Homebrew assets: ${missingHomebrewTargets.join(', ')}`);
            }
            const homebrewAssetsJson = JSON.stringify(homebrewAssets);

            const [owner, repo] = process.env.HOMEBREW_TAP.split('/');
            const workflowId = 'update-formula.yml';
            let tapRepository;
            try {
              tapRepository = await github.rest.repos.get({ owner, repo });
            } catch (error) {
              throw new Error(`TAP_TOKEN cannot access configured Homebrew tap ${process.env.HOMEBREW_TAP} (HTTP ${error.status || 'unknown'})`);
            }
            if (tapRepository.data.full_name.toLowerCase() !== process.env.HOMEBREW_TAP.toLowerCase()) {
              throw new Error(`TAP_TOKEN resolved an unexpected Homebrew tap: ${tapRepository.data.full_name}`);
            }
            let tapWorkflow;
            try {
              tapWorkflow = await github.rest.actions.getWorkflow({ owner, repo, workflow_id: workflowId });
            } catch (error) {
              throw new Error(`TAP_TOKEN cannot read ${workflowId} in configured Homebrew tap ${process.env.HOMEBREW_TAP} (HTTP ${error.status || 'unknown'})`);
            }
            if (tapWorkflow.data.state !== 'active') {
              throw new Error(`${process.env.HOMEBREW_TAP}/${workflowId} is not active`);
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const pollIntervalMs = Number(process.env.HOMEBREW_POLL_INTERVAL_MS ?? 15000);
            const pollTimeoutMs = Number(process.env.HOMEBREW_POLL_TIMEOUT_MS ?? 900000);
            if (!Number.isFinite(pollIntervalMs) || pollIntervalMs < 0 ||
                !Number.isFinite(pollTimeoutMs) || pollTimeoutMs < 0) {
              throw new Error('invalid Homebrew poll timing');
            }
            const deadline = Date.now() + pollTimeoutMs;
            const tapActor = await github.rest.users.getAuthenticated();
            const expectedRunTitle = `Update ${process.env.FORMULA} for ${process.env.TAG}`;
            const runsBeforeDispatch = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: 'workflow_dispatch',
              per_page: 100,
            });
            const priorRunIds = new Set(runsBeforeDispatch.data.workflow_runs.map((run) => run.id));

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: workflowId,
              ref: tapRepository.data.default_branch,
              inputs: {
                formula: process.env.FORMULA,
                tag: process.env.TAG,
                repository,
                assets: homebrewAssetsJson,
              },
            });

            const matchingNewRuns = async () => {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                event: 'workflow_dispatch',
                per_page: 100,
              });
              return response.data.workflow_runs.filter((run) =>
                !priorRunIds.has(run.id) &&
                run.display_title === expectedRunTitle &&
                run.actor?.login?.toLowerCase() === tapActor.data.login.toLowerCase()
              );
            };
            let tapRun;
            do {
              const candidates = await matchingNewRuns();
              if (candidates.length > 1) {
                throw new Error(`multiple new ${expectedRunTitle} runs from ${tapActor.data.login}; dispatch correlation is ambiguous`);
              }
              [tapRun] = candidates;
              if (tapRun || Date.now() >= deadline) break;
              await sleep(Math.min(pollIntervalMs, Math.max(0, deadline - Date.now())));
            } while (Date.now() <= deadline);
            if (!tapRun) {
              throw new Error(`Homebrew handoff timed out waiting for a new ${expectedRunTitle} run in ${process.env.HOMEBREW_TAP}`);
            }
            while (tapRun.status !== 'completed') {
              if (Date.now() >= deadline) {
                throw new Error(`Homebrew handoff timed out waiting for ${tapRun.html_url}`);
              }
              await sleep(Math.min(pollIntervalMs, Math.max(0, deadline - Date.now())));
              tapRun = (await github.rest.actions.getWorkflowRun({ owner, repo, run_id: tapRun.id })).data;
            }
            if (tapRun.conclusion !== 'success') {
              throw new Error(`tap workflow ${tapRun.html_url} concluded ${tapRun.conclusion}`);
            }
            const postCompletionMatches = await matchingNewRuns();
            if (postCompletionMatches.some((run) => run.id !== tapRun.id)) {
              throw new Error(`another new ${expectedRunTitle} run appeared; dispatch correlation is ambiguous`);
            }
            core.info(`tap workflow succeeded: ${tapRun.html_url}`);
            let lastMismatch = 'formula not observed';

            const verifyFormula = (source) => {
              const analyzerProgram = String.raw`
                def fail_grammar(message)
                  raise ArgumentError, message
                end

                def token_name(node, type)
                  return nil unless node.is_a?(Array) && node[0] == type && node[1].is_a?(String)
                  node[1]
                end

                def literal_string(node)
                  return nil unless node.is_a?(Array) && node[0] == :string_literal
                  content = node[1]
                  return nil unless content.is_a?(Array) && content[0] == :string_content
                  parts = content.drop(1)
                  return "" if parts.empty?
                  return nil unless parts.all? { |part| part.is_a?(Array) && part[0] == :@tstring_content }
                  value = parts.map { |part| part[1] }.join
                  return nil if value.match?(/[\\\x00-\x1f\x7f]/)
                  value
                end

                def literal_symbol(node)
                  return nil unless node.is_a?(Array) && node[0] == :symbol_literal
                  symbol = node[1]
                  return nil unless symbol.is_a?(Array) && symbol[0] == :symbol
                  token_name(symbol[1], :@ident) || token_name(symbol[1], :@op) || token_name(symbol[1], :@kw)
                end

                def static_assoc?(node)
                  return false unless node.is_a?(Array) && node[0] == :assoc_new
                  key = node[1]
                  key_static = token_name(key, :@label) || literal_string(key) || literal_symbol(key)
                  !key_static.nil? && static_literal?(node[2])
                end

                def static_literal?(node)
                  return true unless literal_string(node).nil?
                  return true unless literal_symbol(node).nil?
                  return false unless node.is_a?(Array)
                  case node[0]
                  when :bare_assoc_hash
                    Array(node[1]).all? { |entry| static_assoc?(entry) }
                  when :array
                    elements = node[1]
                    elements.nil? || (elements[0] == :args_add_block && elements[2] == false && Array(elements[1]).all? { |entry| static_literal?(entry) })
                  else
                    false
                  end
                end

                def command_parts(node)
                  return nil unless node.is_a?(Array) && node[0] == :command
                  name = token_name(node[1], :@ident)
                  arguments = node[2]
                  return nil if name.nil? || !arguments.is_a?(Array) || arguments[0] != :args_add_block || arguments[2] != false
                  values = arguments[1]
                  return nil unless values.is_a?(Array)
                  [name, values]
                end

                def zero_arg_fcall?(node, name)
                  node.is_a?(Array) && node[0] == :method_add_arg &&
                    node[1].is_a?(Array) && node[1][0] == :fcall && token_name(node[1][1], :@ident) == name &&
                    node[2] == []
                end

                def clean_bodystmt(node)
                  return nil unless node.is_a?(Array) && node[0] == :bodystmt && node[2..4] == [nil, nil, nil]
                  node[1] || []
                end

                def cpu_arm_condition?(node)
                  return false unless node.is_a?(Array) && node[0] == :call && token_name(node[3], :@ident) == "arm?"
                  receiver = node[1]
                  receiver.is_a?(Array) && receiver[0] == :const_path_ref &&
                    receiver[1].is_a?(Array) && receiver[1][0] == :var_ref && token_name(receiver[1][1], :@const) == "Hardware" &&
                    token_name(receiver[2], :@const) == "CPU"
                end

                def build_head_condition?(node)
                  return false unless node.is_a?(Array) && node[0] == :call && token_name(node[3], :@ident) == "head?"
                  receiver = node[1]
                  receiver.is_a?(Array) && receiver[0] == :vcall && token_name(receiver[1], :@ident) == "build"
                end

                def fetch_pair(statements, index)
                  url_command = command_parts(statements[index])
                  sha_command = command_parts(statements[index + 1])
                  return nil unless url_command&.first == "url"
                  fail_grammar("url must be followed by sha256") unless sha_command&.first == "sha256"
                  fail_grammar("url must have one literal string") unless url_command[1].length == 1 && (url = literal_string(url_command[1][0]))
                  fail_grammar("sha256 must have one literal string") unless sha_command[1].length == 1 && (sha = literal_string(sha_command[1][0]))
                  fail_grammar("sha256 must be lowercase hexadecimal") unless sha.match?(/\A[0-9a-f]{64}\z/)
                  [{ "url" => url, "sha256" => sha }, index + 2]
                end

                def validate_fetch_statements(statements, fetches)
                  index = 0
                  while index < statements.length
                    if (pair = fetch_pair(statements, index))
                      fetches << pair[0]
                      index = pair[1]
                      next
                    end
                    statement = statements[index]
                    if statement.is_a?(Array) && statement[0] == :if && cpu_arm_condition?(statement[1])
                      alternate = statement[3]
                      fail_grammar("CPU branch requires else") unless alternate.is_a?(Array) && alternate[0] == :else
                      validate_fetch_statements(statement[2] || [], fetches)
                      validate_fetch_statements(alternate[1] || [], fetches)
                      index += 1
                      next
                    end
                    fail_grammar("unsupported fetch statement #{statement&.first}")
                  end
                end

                def parse_head(arguments)
                  fail_grammar("head requires literal URL") unless (1..2).cover?(arguments.length) && (url = literal_string(arguments[0]))
                  branch = nil
                  if arguments.length == 2
                    options = arguments[1]
                    fail_grammar("head options must be a static hash") unless options.is_a?(Array) && options[0] == :bare_assoc_hash
                    entries = Array(options[1])
                    fail_grammar("head permits only branch") unless entries.length == 1 && entries[0][0] == :assoc_new && token_name(entries[0][1], :@label) == "branch:"
                    branch = literal_string(entries[0][2])
                    fail_grammar("head branch must be literal") if branch.nil?
                  end
                  { "url" => url, "branch" => branch }
                end

                source = STDIN.read
                tree = Ripper.sexp(source)
                fail_grammar("invalid Ruby syntax") if tree.nil?
                program = tree[1]
                fail_grammar("formula must contain one class") unless program.is_a?(Array) && program.length == 1
                klass = program[0]
                fail_grammar("formula root must be a class") unless klass.is_a?(Array) && klass[0] == :class
                class_name = klass.dig(1, 1)
                superclass = klass[2]
                fail_grammar("formula must inherit Formula") unless klass[1]&.first == :const_ref && token_name(class_name, :@const) &&
                  superclass.is_a?(Array) && superclass[0] == :var_ref && token_name(superclass[1], :@const) == "Formula"
                statements = clean_bodystmt(klass[3])
                fail_grammar("formula class body may not rescue or ensure") if statements.nil?

                fetches = []
                head = nil
                index = 0
                while index < statements.length
                  if (pair = fetch_pair(statements, index))
                    fetches << pair[0]
                    index = pair[1]
                    next
                  end
                  statement = statements[index]
                  command = command_parts(statement)
                  if command && %w[desc homepage version license].include?(command[0])
                    fail_grammar("#{command[0]} requires one literal string") unless command[1].length == 1 && !literal_string(command[1][0]).nil?
                  elsif command && command[0] == "depends_on"
                    fail_grammar("depends_on requires static arguments") if command[1].empty? || !command[1].all? { |argument| static_literal?(argument) }
                  elsif command && command[0] == "head"
                    fail_grammar("multiple head declarations") unless head.nil?
                    head = parse_head(command[1])
                  elsif statement.is_a?(Array) && statement[0] == :if_mod && build_head_condition?(statement[1])
                    dependency = command_parts(statement[2])
                    fail_grammar("only static depends_on may use build.head?") unless dependency&.first == "depends_on" && dependency[1].all? { |argument| static_literal?(argument) }
                  elsif statement.is_a?(Array) && statement[0] == :method_add_block &&
                        %w[on_macos on_linux].any? { |name| zero_arg_fcall?(statement[1], name) }
                    block = statement[2]
                    nested = block.is_a?(Array) && block[0] == :do_block && block[1].nil? ? clean_bodystmt(block[2]) : nil
                    fail_grammar("platform block must be a plain do block") if nested.nil?
                    validate_fetch_statements(nested, fetches)
                  elsif statement.is_a?(Array) && statement[0] == :def
                    method_name = token_name(statement[1], :@ident)
                    fail_grammar("only install and caveats methods are allowed") unless %w[install caveats].include?(method_name)
                    fail_grammar("formula methods may not take parameters") unless statement[2] == [:params, nil, nil, nil, nil, nil, nil, nil]
                  elsif statement.is_a?(Array) && statement[0] == :method_add_block && zero_arg_fcall?(statement[1], "test")
                    block = statement[2]
                    fail_grammar("test must be a plain do block") unless block.is_a?(Array) && block[0] == :do_block && block[1].nil?
                  else
                    fail_grammar("unsupported load-time formula statement #{statement&.first}")
                  end
                  index += 1
                end

                fail_grammar("formula has no stable fetches") if fetches.empty?
                puts JSON.generate({ "fetches" => fetches, "head" => head })
              `;
              let analysis;
              try {
                analysis = JSON.parse(execFileSync(
                  'ruby',
                  ['-rripper', '-rjson', '-e', analyzerProgram],
                  {
                    encoding: 'utf8',
                    env: { PATH: process.env.PATH },
                    input: source,
                    stdio: ['pipe', 'pipe', 'pipe'],
                  },
                ));
              } catch (error) {
                const detail = error.stderr?.toString().trim().split('\n')[0];
                return { ok: false, reason: `formula violates closed load-time grammar${detail ? `: ${detail}` : ''}` };
              }

              if (analysis.head !== null) {
                const expectedHead = `https://github.com/${repository}.git`;
                if (analysis.head.url !== expectedHead ||
                    (analysis.head.branch !== null && analysis.head.branch !== process.env.SOURCE_DEFAULT_BRANCH)) {
                  return { ok: false, reason: 'formula head is not the exact source repository default branch' };
                }
              }

              const seenAssets = new Set();
              for (const binding of analysis.fetches) {
                let url;
                try {
                  url = new URL(binding.url);
                } catch {
                  return { ok: false, reason: `formula URL is invalid: ${binding.url}` };
                }
                const rawComponents = url.pathname.split('/');
                let components;
                try {
                  components = rawComponents.map((component) => decodeURIComponent(component));
                } catch {
                  return { ok: false, reason: `formula URL has invalid path encoding: ${binding.url}` };
                }
                const asset = components[6] || '';
                const decodedSeparator = components.some((component) => component.includes('/') || component.includes('\\'));
                if (url.protocol !== 'https:' || url.hostname !== 'github.com' || url.port ||
                    url.username || url.password || rawComponents.length !== 7 || rawComponents[0] !== '' ||
                    decodedSeparator || components[1].toLowerCase() !== context.repo.owner.toLowerCase() ||
                    components[2].toLowerCase() !== context.repo.repo.toLowerCase() ||
                    components[3] !== 'releases' || components[4] !== 'download' ||
                    components[5] !== process.env.TAG || !asset || url.search || url.hash) {
                  return { ok: false, reason: `formula URL is not an exact ${repository}@${process.env.TAG} release asset: ${binding.url}` };
                }
                if (seenAssets.has(asset)) return { ok: false, reason: `formula repeats release asset ${asset}` };
                seenAssets.add(asset);
                const expectedDigest = expectedDigests.get(asset);
                if (!expectedDigest) return { ok: false, reason: `formula asset ${asset} is absent from verified SHA256SUMS` };
                if (binding.sha256.toLowerCase() !== expectedDigest) {
                  return { ok: false, reason: `formula sha256 mismatch for ${asset}` };
                }
              }
              return { ok: true, assets: [...seenAssets].sort() };
            };

            do {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: `Formula/${process.env.FORMULA}.rb`,
                  ref: tapRepository.data.default_branch,
                });
                if (Array.isArray(response.data) || response.data.type !== 'file' || response.data.encoding !== 'base64') {
                  lastMismatch = 'formula path is not a base64 file';
                } else {
                  const source = Buffer.from(response.data.content.replace(/\s/g, ''), 'base64').toString('utf8');
                  const result = verifyFormula(source);
                  if (result.ok) {
                    core.info(`verified ${process.env.HOMEBREW_TAP}/Formula/${process.env.FORMULA}.rb assets: ${result.assets.join(', ')}`);
                    return;
                  }
                  lastMismatch = result.reason;
                }
              } catch (error) {
                if (error.status !== 404) throw error;
                lastMismatch = 'formula file not found';
              }
              if (Date.now() >= deadline) break;
              await sleep(Math.min(pollIntervalMs, Math.max(0, deadline - Date.now())));
            } while (Date.now() <= deadline);

            throw new Error(`Homebrew handoff timed out waiting for ${process.env.HOMEBREW_TAP}/Formula/${process.env.FORMULA}.rb: ${lastMismatch}`);

  closeout:
    name: 8 · Open next Unreleased PR
    if: always() && needs.publish.result == 'success' && (needs.handoff.result == 'success' || needs.handoff.result == 'skipped')
    needs: [validate, publish, handoff]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out current default branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.default-branch }}
      - name: Add Unreleased section and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          closeout_permission_diagnostic() {
            echo "::error title=Closeout PR disabled::Repository Actions setting can_approve_pull_request_reviews=true is required. In Settings > Actions > General > Workflow permissions, enable Allow GitHub Actions to create and approve pull requests." >&2
          }
          if grep -Eq '^## \[?Unreleased\]?' CHANGELOG.md; then
            echo "CHANGELOG.md already has an Unreleased section"
            exit 0
          fi
          workflow_policy=
          if workflow_policy=$(gh api "repos/$GITHUB_REPOSITORY/actions/permissions/workflow" 2>/dev/null); then
            if [[ "$(jq -r '.can_approve_pull_request_reviews' <<<"$workflow_policy")" != true ]]; then
              closeout_permission_diagnostic
              exit 1
            fi
          fi
          ruby -e '
            path = "CHANGELOG.md"
            text = File.read(path)
            marker = text.index(/^## /) || text.length
            prefix = text[0...marker].rstrip
            suffix = text[marker..]
            File.write(path, "#{prefix}\n\n## Unreleased\n\n#{suffix}")
          '
          branch="release/next-unreleased-${TAG#v}-$GITHUB_RUN_ID"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch -c "$branch"
          git add CHANGELOG.md
          git commit -m "chore: open next unreleased section"
          git push origin "$branch"
          body_file="$RUNNER_TEMP/closeout-pr.md"
          cat >"$body_file" <<'EOF'
          Opens the next Unreleased changelog section after the verified release.

          Created by the fleet release closeout stage.
          EOF
          if ! pr_output=$(gh pr create --base "${{ needs.validate.outputs.default-branch }}" --head "$branch" \
            --title "chore: open next Unreleased section" --body-file "$body_file" 2>&1); then
            printf '%s\n' "$pr_output" >&2
            if grep -Fqi 'not permitted to create or approve pull requests' <<<"$pr_output"; then
              closeout_permission_diagnostic
            fi
            exit 1
          fi
          printf '%s\n' "$pr_output"
